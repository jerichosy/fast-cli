name: Docker

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: fast-cli:ci
      - name: Verify CLI entrypoint
        run: docker run --rm fast-cli:ci --help
      - name: Verify JSON output can be redirected to a file
        run: |
          docker run --rm fast-cli:ci --json > result.json
          jq -e '.downloadSpeed > 0 and .downloadUnit == "Mbps"' result.json
